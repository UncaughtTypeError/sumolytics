<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sumolytics</title>
  <meta name="description" content="Every bout. Every rank. Every career.">
  <meta property="og:title" content="Sumolytics">
  <meta property="og:description" content="Every bout. Every rank. Every career.">
  <meta property="og:type" content="website">
  <meta name="theme-color" content="#0d0d10">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d0d10;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem 8rem;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      user-select: none;
    }
    .logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1;
      text-align: center;
    }
    .logo-wordmark {
      font-size: 1.875rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #eeeef4;
    }
    .logo-wordmark .lytics {
      margin-left: 0.375rem;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.025em;
      color: #e63946;
    }
    .logo-tagline {
      margin-top: 0.25rem;
      font-size: 0.75rem;
      letter-spacing: 0.05em;
      color: #8a8a9e;
    }
    .coming-soon {
      margin-top: 2.75rem;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #4e4e62;
    }
  </style>
</head>
<body>
  <div class="logo">
    <svg width="52" height="52" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <polygon points="10,1 38,1 47,10 47,38 38,47 10,47 1,38 1,10" fill="none" stroke="#e63946" stroke-width="1.5"/>
      <circle cx="24" cy="24" r="15" fill="none" stroke="#e63946" stroke-width="1.5" stroke-opacity="0.55"/>
      <rect x="13" y="23" width="4" height="8"  rx="1" fill="#e63946" opacity="1"/>
      <rect x="19" y="17" width="4" height="14" rx="1" fill="#e63946" opacity="0.85"/>
      <rect x="25" y="20" width="4" height="11" rx="1" fill="#e63946" opacity="0.7"/>
      <rect x="31" y="25" width="4" height="6"  rx="1" fill="#e63946" opacity="0.55"/>
    </svg>
    <div class="logo-text">
      <div class="logo-wordmark">SUMO<span class="lytics">LYTICS</span></div>
      <div class="logo-tagline">Every bout. Every rank. Every career.</div>
    </div>
  </div>
  <div class="coming-soon">Coming soon</div>
</body>
</html>
